name: Update GRC Intelligence Dashboard

on:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday at 7am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser

      - name: Run fetch script
        run: python fetch.py

      - name: Commit and push updated dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html grc_security_updates.csv
          git diff --staged --quiet || git commit -m "Auto-update: GRC Intelligence Dashboard $(date +'%Y-%m-%d')"
          git push
